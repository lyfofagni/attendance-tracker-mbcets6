<style>
  :root{
    --bg:#131316;
    --surface:#1e1f24;
    --surface-2:#26272d;
    --surface-raised:#18191d;
    --border:#2e2f36;
    --border-strong:#3c3d45;
    --text:#e8eaed;
    --text-soft:#9aa0a6;
    --text-faint:#6e7079;
    --accent:#8ab4f8;
    --accent-ink:#0b2545;
    --accent-soft:#1f2c40;
    --present:#81c995;
    --present-bg:#1c3626;
    --absent:#f28b82;
    --absent-bg:#3a2420;
    --nc:#9aa0a6;
    --nc-bg:#2a2b30;
    --holiday:#d7aefb;
    --holiday-ink:#2a1a3d;
    --holiday-bg:#2f2740;
    --radius:14px;
    --font-main:'Google Sans','Google Sans Text',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --font-code:'Google Sans Code','Google Sans',"Courier New",monospace;

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-main);

  .topbar{
    background:var(--surface-raised);
    color:var(--text);
    padding:18px 20px 16px;

    top:0;
    z-index:10;
    border-bottom:1px solid var(--border);
  }
  .topbar .eyebrow{
    font-family:var(--font-code);
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--accent);
    opacity:0.95;
  }
  .topbar h1{
    margin:2px 0 0;
    font-size:20px;
    font-weight:700;
    letter-spacing:0.2px;
    color:var(--text);
  }
  .tabs{
    display:flex;
    gap:8px;
    margin:14px 20px 0;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:10px 0;
    border-radius:10px;
    background:var(--surface);
    border:1px solid var(--border);
    font-size:14px;
    font-weight:500;
    color:var(--text-soft);
    cursor:pointer;
  }
  .tab.active{
    background:var(--accent);
    color:var(--accent-ink);
    border-color:var(--accent);

  }
  .content{padding:16px 20px 0;}

  .datebar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:10px 12px;
    margin-bottom:14px;
  }
  .datebar button{
    width:36px;height:36px;
    border-radius:50%;
    border:1px solid var(--border);
    background:var(--surface-2);
    font-size:16px;
    color:var(--text);
  }
  .datebar .date-label{
    text-align:center;
    flex:1;
  }
  .date-label .dow{
    font-weight:700;
    font-size:15px;
    color:var(--text);
  }
  .date-label .full{

    color:var(--text-soft);
    font-family:var(--font-code);
  }
  .today-btn{
    font-size:11px;
    padding:5px 10px;
    border-radius:8px;
    border:1px solid var(--accent);
    color:var(--accent);
    background:var(--accent-soft);

  .period-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px 14px 12px;
    margin-bottom:12px;
    position:relative;
    overflow:hidden;
  }
  .period-card::before{
    content:"";
    position:absolute;
    left:0;top:0;bottom:0;
    width:5px;
    background:var(--stripe,var(--border-strong));
  }
  .period-card.present::before{background:var(--present);}
  .period-card.absent::before{background:var(--absent);}
  .period-card.nc::before{background:var(--nc);}
  .period-card.holiday::before{background:var(--holiday);}

  .holiday-toggle-btn{

    font-weight:600;
    font-family:var(--font-main);

  .holiday-toggle-btn.active{

  }

  .p-time{

  .status-row button.sel-absent{background:var(--absent-bg);color:var(--absent);border-color:var(--absent);}
  .status-row button.sel-nc{background:var(--nc-bg);color:var(--nc);border-color:var(--nc);}

    height:14px;
    cursor:pointer;
  }

  .stat-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:10px;
  }
  .stat-top{

    justify-content:space-between;

  .stat-name{font-weight:700;font-size:14px;color:var(--text);}
  .stat-code{font-family:var(--font-code);font-size:11px;color:var(--text-soft);}
  .stat-pct{font-size:18px;font-weight:700;}

  .pct-warn{color:var(--accent);}
  .pct-bad{color:var(--absent);}
  .bar-bg{

    border-radius:5px;

  .bar-fill{height:100%;border-radius:5px;}
  .stat-sub{

    justify-content:space-between;
    font-size:11px;
    color:var(--text-soft);
    margin-top:6px;
    font-family:var(--font-code);

  .overall-card{

    border:1px solid var(--border);
    border-radius:var(--radius);

    font-size:12px;
    color:var(--text-soft);
    margin-bottom:6px;
  }
  .login-card input{
    width:100%;
    padding:11px 12px;
    margin-bottom:14px;
    border-radius:9px;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:var(--text);
    font-size:14px;
    font-family:var(--font-main);
  }
  .login-card input:focus{outline:none;border-color:var(--accent);}
  .login-btn{
    width:100%;
    padding:11px 0;
    border-radius:9px;
    border:1px solid var(--accent);
    background:var(--accent);
    color:var(--accent-ink);
    font-size:14px;
    font-weight:700;
    font-family:var(--font-main);
    margin-bottom:10px;
  }
  .login-switch{
    width:100%;
    padding:9px 0;
    border-radius:9px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text-soft);
    font-size:13px;
    font-family:var(--font-main);
  }
  .login-error{
    color:var(--absent);
    font-size:12px;
    margin:-6px 0 12px;
    min-height:14px;
  }
  .signout-btn{
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text-soft);
    font-size:12px;
    padding:6px 12px;
    border-radius:8px;
    font-family:var(--font-main);
  }
  .topbar-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
  }
  .user-email{
    font-size:11px;
    color:var(--text-faint);
    font-family:var(--font-code);
    margin-top:6px;
  }
</style>

const TERM_START = new Date(2026,6,1);   
const TERM_END   = new Date(2026,10,5);  

let currentDate = new Date();
currentDate.setHours(0,0,0,0);
let activeTab = 'today';

function fmtKey(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtFull(d){
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function dowName(d){
  return d.toLocaleDateString('en-US',{weekday:'long'});
}

const firebaseConfig = {
  apiKey: "AIzaSyD75DbH3nBxRYefWCgPPwac2Zp_5IArEGs",
  authDomain: "mbcet-s6-attendance-tracker.firebaseapp.com",
  projectId: "mbcet-s6-attendance-tracker",
  storageBucket: "mbcet-s6-attendance-tracker.firebasestorage.app",
  messagingSenderId: "130344758664",

};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let authMode = 'signin'; 

function toggleAuthMode(){
  authMode = (authMode === 'signin') ? 'signup' : 'signin';
  document.getElementById('login-title').textContent = authMode === 'signin' ? 'Sign in' : 'Create account';
  document.getElementById('login-submit').textContent = authMode === 'signin' ? 'Sign in' : 'Create account';
  document.getElementById('login-toggle-mode').textContent = authMode === 'signin' ? 'Need an account? Sign up' : 'Already have an account? Sign in';
  document.getElementById('login-error').textContent = '';
}

async function handleAuthSubmit(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errBox = document.getElementById('login-error');
  errBox.textContent = '';
  if(!email || !password){
    errBox.textContent = 'Enter both email and password.';
    return;
  }
  try{
    if(authMode === 'signin'){
      await auth.signInWithEmailAndPassword(email, password);
    }else{
      await auth.createUserWithEmailAndPassword(email, password);
    }
  }catch(e){
    errBox.textContent = e.message.replace('Firebase: ', '');
  }
}

function handleSignOut(){
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  const loginScreen = document.getElementById('login-screen');
  const app = document.getElementById('app');
  if(user){
    loginScreen.style.display = 'none';
    app.style.display = 'block';
    document.getElementById('user-email-label').textContent = user.email;
    renderToday();
  }else{
    loginScreen.style.display = 'flex';
    app.style.display = 'none';
  }
});

const storage = {
  async get(key){
    const uid = auth.currentUser.uid;
    const snap = await db.collection('users').doc(uid).collection('data').doc(key).get();
    if(!snap.exists) return null;
    return {key, value: snap.data().value};
  },
  async set(key, value){
    const uid = auth.currentUser.uid;
    await db.collection('users').doc(uid).collection('data').doc(key).set({value});
    return {key, value};
  },
  async list(prefix){
    const uid = auth.currentUser.uid;
    const snap = await db.collection('users').doc(uid).collection('data').get();
    const keys = [];
    snap.forEach(d => { if(d.id.indexOf(prefix) === 0) keys.push(d.id); });
    return {keys};
  }
};

async function getDayRecord(dateObj){
  const key = 'day:'+fmtKey(dateObj);
  try{
    const res = await storage.get(key);
    if(res && res.value) return JSON.parse(res.value);
  }catch(e){}
  const dow = dateObj.getDay();
  const tmpl = TEMPLATE[dow] || [];
  return tmpl.map(p => {
    const name = p.label || SUBJECTS[p.code];
    return {
      id:p.id, time:p.time, code:p.code, name:name,
      origCode:p.code, origName:name, status:'unmarked'
    };
  });
}

async function saveDayRecord(dateObj, periods){
  const key = 'day:'+fmtKey(dateObj);
  try{
    await storage.set(key, JSON.stringify(periods));
  }catch(e){ console.error('save failed', e); }
}

function inTerm(d){
  return d >= TERM_START && d <= TERM_END;
}

async function renderToday(){
  document.getElementById('dow-label').textContent = dowName(currentDate);
  document.getElementById('date-label').textContent = fmtFull(currentDate);
  const list = document.getElementById('periods-list');
  const holidayBtn = document.getElementById('holiday-toggle');

  if(!inTerm(currentDate)){
    holidayBtn.style.display = 'none';
    list.innerHTML = '<div class="empty-note">Outside the semester window (1 Jul – 5 Nov 2026). No classes to mark.</div>';
    return;
  }
  const dow = currentDate.getDay();
  if(dow === 0 || dow === 6){
    holidayBtn.style.display = 'none';
    list.innerHTML = '<div class="empty-note">No classes over the weekend.</div>';
    return;
  }

  const periods = await getDayRecord(currentDate);
  if(periods.length === 0){
    holidayBtn.style.display = 'none';
    list.innerHTML = '<div class="empty-note">Nothing scheduled.</div>';
    return;
  }
  holidayBtn.style.display = 'block';

  list.innerHTML = '';
  const allHoliday = periods.every(p => p.status === 'holiday');
  holidayBtn.classList.toggle('active', allHoliday);
  holidayBtn.textContent = allHoliday ? 'Holiday marked — tap to undo' : 'Mark whole day as holiday';

  periods.forEach(p => {
    const card = document.createElement('div');
    card.className = 'period-card ' + (p.status==='present'?'present':p.status==='absent'?'absent':p.status==='nc'?'nc':p.status==='holiday'?'holiday':'');

    const swapOptions = Object.keys(SUBJECTS).map(code =>
      `<option value="${code}" ${p.code===code?'selected':''}>${SUBJECTS[code]}</option>`
    ).join('');

    card.innerHTML = `
      <div class="p-top">
        <div>
          <div class="p-time">${p.time}</div>
          <div class="p-name">${p.name}</div>
          <div class="p-code">${p.code}${p.code!==p.origCode?' · substituted':''}</div>
        </div>
        <button class="swap-btn" data-id="${p.id}">Swap</button>
      </div>
      <div class="status-row">
        <button data-id="${p.id}" data-status="present" class="${p.status==='present'?'sel-present':''}">Present</button>
        <button data-id="${p.id}" data-status="absent" class="${p.status==='absent'?'sel-absent':''}">Absent</button>
        <button data-id="${p.id}" data-status="nc" class="${p.status==='nc'?'sel-nc':''}">No class</button>
        <button data-id="${p.id}" data-status="holiday" class="${p.status==='holiday'?'sel-holiday':''}">Holiday</button>
      </div>
      <div class="swap-panel" id="swap-${p.id}">
        <select id="sel-${p.id}">${swapOptions}</select>
        <div class="swap-actions">
          <button class="reset" data-id="${p.id}">Reset to timetable</button>
          <button class="apply" data-id="${p.id}">Apply swap</button>
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  list.querySelectorAll('.status-row button').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const status = btn.dataset.status;
      const periods = await getDayRecord(currentDate);
      const p = periods.find(x=>x.id===id);
      p.status = (p.status === status) ? 'unmarked' : status;
      await saveDayRecord(currentDate, periods);
      renderToday();
    });
  });

  list.querySelectorAll('.swap-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const panel = document.getElementById('swap-'+id);
      openSwapId = (openSwapId === id) ? null : id;
      list.querySelectorAll('.swap-panel').forEach(pn => pn.classList.remove('open'));
      if(openSwapId) document.getElementById('swap-'+openSwapId).classList.add('open');
    });
  });

  list.querySelectorAll('.swap-actions .apply').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const newCode = document.getElementById('sel-'+id).value;
      const periods = await getDayRecord(currentDate);
      const p = periods.find(x=>x.id===id);
      p.code = newCode;
      p.name = SUBJECTS[newCode];
      await saveDayRecord(currentDate, periods);
      openSwapId = null;
      renderToday();
    });
  });
  list.querySelectorAll('.swap-actions .reset').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const periods = await getDayRecord(currentDate);
      const p = periods.find(x=>x.id===id);
      p.code = p.origCode;
      p.name = p.origName;
      await saveDayRecord(currentDate, periods);
      openSwapId = null;
      renderToday();
    });
  });
}

async function renderStats(){
  const overallWrap = document.getElementById('overall-wrap');
  const list = document.getElementById('stats-list');
  list.innerHTML = '<div class="loading">Crunching the numbers…</div>';

  const combineLabs = document.getElementById('combine-labs-toggle').checked;

  let keys = [];
  try{
    const res = await storage.list('day:');
    keys = (res && res.keys) ? res.keys : [];
  }catch(e){ keys = []; }

  const totals = {}; 
  let totalHeld = 0, totalPresent = 0;

  for(const key of keys){
    try{
      const res = await storage.get(key);
      if(!res || !res.value) continue;
      const periods = JSON.parse(res.value);
      periods.forEach(p => {
        if(p.status === 'unmarked' || p.status === 'nc' || p.status === 'holiday') return;
        
        let effectiveCode = p.code;
        if (p.name && p.name.includes('(Lab)')) {
           if (p.code === 'CD') effectiveCode = 'CD_LAB';
           if (p.code === 'WT') effectiveCode = 'WT_LAB';
        }

        if (combineLabs) {
           if (effectiveCode === 'CD_LAB') effectiveCode = 'CD';
           if (effectiveCode === 'WT_LAB') effectiveCode = 'WT';
        }

        let dispName = SUBJECTS[effectiveCode] || p.name || effectiveCode;
        if (combineLabs) {
           if (effectiveCode === 'CD') dispName = "Compiler Design (Theory + Lab)";
           if (effectiveCode === 'WT') dispName = "Web Technology (Theory + Lab)";
        }

        if(!totals[effectiveCode]) totals[effectiveCode] = {held:0, present:0, name:dispName};
        totals[effectiveCode].held += 1;
        totalHeld += 1;
        if(p.status === 'present'){ totals[effectiveCode].present += 1; totalPresent += 1; }
      });
    }catch(e){}
  }

  const overallPct = totalHeld ? Math.round((totalPresent/totalHeld)*100) : 0;
  overallWrap.innerHTML = `
    <div class="overall-card">
      <div>
        <div class="lbl">Overall attendance</div>
        <div class="val">${overallPct}%</div>
      </div>
      <div style="text-align:right;font-size:12px;color:var(--text-soft);">
        ${totalPresent} / ${totalHeld}<br>periods attended
      </div>
    </div>
  `;

  const codes = Object.keys(totals).sort((a,b)=> totals[b].held - totals[a].held);
  if(codes.length === 0){
    list.innerHTML = '<div class="empty-note">No attendance marked yet. Head to the Today tab to get started.</div>';
    return;
  }

  list.innerHTML = '';
  codes.forEach(code => {
    const t = totals[code];
    const pct = t.held ? Math.round((t.present/t.held)*100) : 0;
    const pctClass = pct>=75 ? 'pct-good' : pct>=65 ? 'pct-warn' : 'pct-bad';
    const barColor = pct>=75 ? 'var(--present)' : pct>=65 ? 'var(--accent)' : 'var(--absent)';
    const div = document.createElement('div');
    div.className = 'stat-card';
    div.innerHTML = `
      <div class="stat-top">
        <div>
          <div class="stat-name">${t.name}</div>
          <div class="stat-code">${code}</div>
        </div>
        <div class="stat-pct ${pctClass}">${pct}%</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${barColor};"></div></div>
      <div class="stat-sub"><span>Present: ${t.present}</span><span>Held: ${t.held}</span></div>
    `;
    list.appendChild(div);
  });
}

function switchTab(tab){
  activeTab = tab;
  document.getElementById('tab-today').classList.toggle('active', tab==='today');
  document.getElementById('tab-stats').classList.toggle('active', tab==='stats');
  document.getElementById('view-today').style.display = tab==='today' ? 'block':'none';
  document.getElementById('view-stats').style.display = tab==='stats' ? 'block':'none';
  if(tab==='today') renderToday(); else renderStats();
}

async function toggleDayHoliday(){
  const periods = await getDayRecord(currentDate);
  if(periods.length === 0) return;
  const allHoliday = periods.every(p => p.status === 'holiday');
  periods.forEach(p => { p.status = allHoliday ? 'unmarked' : 'holiday'; });
  await saveDayRecord(currentDate, periods);
  renderToday();
}

function changeDate(delta){
  currentDate.setDate(currentDate.getDate()+delta);
  renderToday();
}
function goToday(){
  currentDate = new Date();
  currentDate.setHours(0,0,0,0);
  renderToday();
}
