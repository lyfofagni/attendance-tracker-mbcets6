<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>S7 CS1 · MBCET Attendance</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Attendance">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#131316">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23131316'/%3E%3Ctext x='50' y='64' font-size='46' font-family='Arial,sans-serif' font-weight='700' fill='%238ab4f8' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23131316'/%3E%3Ctext x='50' y='64' font-size='46' font-family='Arial,sans-serif' font-weight='700' fill='%238ab4f8' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Google+Sans+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#131316;
    --surface:#1e1f24;
    --surface-2:#26272d;
    --surface-raised:#18191d;
    --border:#2e2f36;
    --border-strong:#3c3d45;
    --text:#e8eaed;
    --text-soft:#9aa0a6;
    --text-faint:#6e7079;
    --accent:#8ab4f8;
    --accent-ink:#0b2545;
    --accent-soft:#1f2c40;
    --present:#81c995;
    --present-bg:#1c3626;
    --absent:#f28b82;
    --absent-bg:#3a2420;
    --nc:#9aa0a6;
    --nc-bg:#2a2b30;
    --holiday:#d7aefb;
    --holiday-ink:#2a1a3d;
    --holiday-bg:#2f2740;
    --radius:14px;
    --font-main:'Google Sans','Google Sans Text',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --font-code:'Google Sans Code','Google Sans',"Courier New",monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-main);
    -webkit-tap-highlight-color:transparent;
    padding-bottom:40px;
  }
  .topbar{
    background:var(--surface-raised);
    color:var(--text);
    padding:18px 20px 16px;
    position:sticky;
    top:0;
    z-index:10;
    border-bottom:1px solid var(--border);
  }
  .topbar .eyebrow{
    font-family:var(--font-code);
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--accent);
    opacity:0.95;
  }
  .topbar h1{
    margin:2px 0 0;
    font-size:20px;
    font-weight:700;
    letter-spacing:0.2px;
    color:var(--text);
  }
  .tabs{
    display:flex;
    gap:8px;
    margin:14px 20px 0;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:10px 0;
    border-radius:10px;
    background:var(--surface);
    border:1px solid var(--border);
    font-size:14px;
    font-weight:500;
    color:var(--text-soft);
    cursor:pointer;
  }
  .tab.active{
    background:var(--accent);
    color:var(--accent-ink);
    border-color:var(--accent);
    font-weight:700;
  }
  .content{padding:16px 20px 0;}

  .datebar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:10px 12px;
    margin-bottom:14px;
  }
  .datebar button{
    width:36px;height:36px;
    border-radius:50%;
    border:1px solid var(--border);
    background:var(--surface-2);
    font-size:16px;
    color:var(--text);
  }
  .datebar .date-label{
    text-align:center;
    flex:1;
  }
  .date-label .dow{
    font-weight:700;
    font-size:15px;
    color:var(--text);
  }
  .date-label .full{
    font-size:12px;
    color:var(--text-soft);
    font-family:var(--font-code);
  }
  .today-btn{
    font-size:11px;
    padding:5px 10px;
    border-radius:8px;
    border:1px solid var(--accent);
    color:var(--accent);
    background:var(--accent-soft);
    margin-left:8px;
  }

  .period-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px 14px 12px;
    margin-bottom:12px;
    position:relative;
    overflow:hidden;
  }
  .period-card::before{
    content:"";
    position:absolute;
    left:0;top:0;bottom:0;
    width:5px;
    background:var(--stripe,var(--border-strong));
  }
  .period-card.present::before{background:var(--present);}
  .period-card.absent::before{background:var(--absent);}
  .period-card.nc::before{background:var(--nc);}
  .period-card.holiday::before{background:var(--holiday);}

  .holiday-toggle-btn{
    display:block;
    width:100%;
    padding:10px 0;
    margin-bottom:14px;
    border-radius:10px;
    border:1px solid var(--holiday);
    background:var(--holiday-bg);
    color:var(--holiday);
    font-size:13px;
    font-weight:600;
    font-family:var(--font-main);
  }
  .holiday-toggle-btn.active{
    background:var(--holiday);
    color:var(--holiday-ink);
  }

  .p-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:10px;
  }
  .p-time{
    font-family:var(--font-code);
    font-size:12px;
    color:var(--text-soft);
    letter-spacing:0.3px;
  }
  .p-name{
    font-size:16px;
    font-weight:700;
    margin-top:2px;
    color:var(--text);
  }
  .p-code{
    font-size:12px;
    color:var(--accent);
    font-weight:600;
    font-family:var(--font-code);
  }
  .swap-btn{
    border:1px solid var(--border);
    background:var(--surface-2);
    border-radius:8px;
    padding:6px 9px;
    font-size:11px;
    color:var(--text-soft);
    white-space:nowrap;
    font-family:var(--font-main);
  }
  .status-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
  }
  .status-row button{
    padding:9px 0;
    border-radius:9px;
    border:1px solid var(--border);
    background:var(--surface-2);
    font-size:12px;
    font-weight:600;
    color:var(--text-soft);
    font-family:var(--font-main);
  }
  .status-row button.sel-present{background:var(--present-bg);color:var(--present);border-color:var(--present);}
  .status-row button.sel-absent{background:var(--absent-bg);color:var(--absent);border-color:var(--absent);}
  .status-row button.sel-nc{background:var(--nc-bg);color:var(--nc);border-color:var(--nc);}
  .status-row button.sel-holiday{background:var(--holiday-bg);color:var(--holiday);border-color:var(--holiday);}

  .empty-note{
    text-align:center;
    color:var(--text-soft);
    font-size:13px;
    padding:30px 10px;
  }

  .swap-panel{
    display:none;
    margin-top:10px;
    padding-top:10px;
    border-top:1px dashed var(--border);
  }
  .swap-panel.open{display:block;}
  .swap-panel select{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid var(--border);
    font-size:13px;
    background:var(--surface-2);
    color:var(--text);
    font-family:var(--font-main);
  }
  .swap-panel .swap-actions{
    display:flex;
    gap:8px;
    margin-top:8px;
  }
  .swap-panel .swap-actions button{
    flex:1;
    padding:8px 0;
    border-radius:8px;
    font-size:12px;
    font-weight:600;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:var(--text-soft);
    font-family:var(--font-main);
  }
  .swap-panel .swap-actions button.reset{color:var(--absent);}
  .swap-panel .swap-actions button.apply{color:var(--accent);}

  .stats-header{
    display:flex;
    justify-content:flex-end;
    margin-bottom:12px;
  }
  .toggle-lbl{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:var(--text-soft);
    cursor:pointer;
    user-select:none;
  }
  .toggle-lbl input{
    accent-color:var(--accent);
    width:14px;
    height:14px;
    cursor:pointer;
  }

  .stat-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:10px;
  }
  .stat-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
  }
  .stat-name{font-weight:700;font-size:14px;color:var(--text);}
  .stat-code{font-family:var(--font-code);font-size:11px;color:var(--text-soft);}
  .stat-pct{font-size:18px;font-weight:700;}
  .pct-good{color:var(--present);}
  .pct-warn{color:var(--accent);}
  .pct-bad{color:var(--absent);}
  .bar-bg{
    width:100%;
    height:8px;
    border-radius:5px;
    background:var(--border);
    overflow:hidden;
  }
  .bar-fill{height:100%;border-radius:5px;}
  .stat-sub{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:var(--text-soft);
    margin-top:6px;
    font-family:var(--font-code);
  }
  .overall-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .overall-card .lbl{font-size:12px;color:var(--text-soft);text-transform:uppercase;letter-spacing:1px;}
  .overall-card .val{font-size:28px;font-weight:700;margin-top:2px;}
  .loading{text-align:center;padding:40px;color:var(--text-soft);font-size:13px;}

  .login-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .login-card{
    width:100%;
    max-width:340px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:28px 24px;
  }
  .login-card .eyebrow{
    font-family:var(--font-code);
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--accent);
  }
  .login-card h1{
    font-size:20px;
    margin:4px 0 20px;
    color:var(--text);
  }
  .login-card label{
    display:block;
    font-size:12px;
    color:var(--text-soft);
    margin-bottom:6px;
  }
  .login-card input{
    width:100%;
    padding:11px 12px;
    margin-bottom:14px;
    border-radius:9px;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:var(--text);
    font-size:14px;
    font-family:var(--font-main);
  }
  .login-card input:focus{outline:none;border-color:var(--accent);}
  .login-btn{
    width:100%;
    padding:11px 0;
    border-radius:9px;
    border:1px solid var(--accent);
    background:var(--accent);
    color:var(--accent-ink);
    font-size:14px;
    font-weight:700;
    font-family:var(--font-main);
    margin-bottom:10px;
  }
  .login-switch{
    width:100%;
    padding:9px 0;
    border-radius:9px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text-soft);
    font-size:13px;
    font-family:var(--font-main);
  }
  .login-error{
    color:var(--absent);
    font-size:12px;
    margin:-6px 0 12px;
    min-height:14px;
  }
  .signout-btn{
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text-soft);
    font-size:12px;
    padding:6px 12px;
    border-radius:8px;
    font-family:var(--font-main);
  }
  .topbar-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
  }
  .user-email{
    font-size:11px;
    color:var(--text-faint);
    font-family:var(--font-code);
    margin-top:6px;
  }

  /* ---- month selector (stats) ---- */
  .stats-header{
    flex-wrap:wrap;
    gap:10px;
  }
  .month-select{
    padding:7px 10px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:var(--text);
    font-size:12px;
    font-family:var(--font-main);
  }

  /* ---- weekend special / add-period ---- */
  .special-toggle-btn{
    display:block;
    width:100%;
    padding:10px 0;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid var(--accent);
    background:var(--accent-soft);
    color:var(--accent);
    font-size:13px;
    font-weight:600;
    font-family:var(--font-main);
  }
  .special-toggle-btn.active{
    background:var(--accent);
    color:var(--accent-ink);
  }
  .special-toggle-btn.off{
    border-color:var(--absent);
    background:var(--absent-bg);
    color:var(--absent);
  }
  .card-remove-btn{
    border:1px solid var(--absent);
    background:var(--absent-bg);
    color:var(--absent);
    border-radius:8px;
    padding:6px 9px;
    font-size:11px;
    font-family:var(--font-main);
    margin-left:6px;
  }
  .add-period-panel{
    background:var(--surface);
    border:1px dashed var(--border-strong);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:12px;
  }
  .add-period-panel label{
    display:block;
    font-size:11px;
    color:var(--text-soft);
    margin-bottom:5px;
  }
  .add-period-panel input, .add-period-panel select{
    width:100%;
    padding:9px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:var(--text);
    font-size:13px;
    font-family:var(--font-main);
  }
  .add-period-panel button{
    width:100%;
    padding:9px 0;
    border-radius:8px;
    border:1px solid var(--accent);
    background:var(--accent);
    color:var(--accent-ink);
    font-size:13px;
    font-weight:700;
    font-family:var(--font-main);
  }
  .add-period-launch{
    display:block;
    width:100%;
    padding:10px 0;
    margin-top:4px;
    margin-bottom:12px;
    border-radius:10px;
    border:1px dashed var(--border-strong);
    background:transparent;
    color:var(--text-soft);
    font-size:13px;
    font-weight:600;
    font-family:var(--font-main);
  }

  /* ---- calendar / monthly view ---- */
  .cal-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:10px 12px;
    margin-bottom:14px;
  }
  .cal-nav button{
    width:36px;height:36px;
    border-radius:50%;
    border:1px solid var(--border);
    background:var(--surface-2);
    font-size:16px;
    color:var(--text);
  }
  .cal-nav .cal-title{
    font-weight:700;
    font-size:15px;
    color:var(--text);
    text-align:center;
    flex:1;
  }
  .cal-summary{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .cal-summary .lbl{font-size:12px;color:var(--text-soft);text-transform:uppercase;letter-spacing:1px;}
  .cal-summary .val{font-size:26px;font-weight:700;margin-top:2px;}
  .pct-good{color:var(--present);}
  .pct-warn{color:#f2c14e;}
  .pct-bad{color:var(--absent);}
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
    margin-bottom:14px;
  }
  .cal-dow{
    text-align:center;
    font-size:10px;
    color:var(--text-faint);
    font-family:var(--font-code);
    padding-bottom:2px;
  }
  .cal-cell{
    aspect-ratio:1;
    border-radius:9px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:600;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text-soft);
    cursor:pointer;
  }
  .cal-cell.cal-blank{visibility:hidden;cursor:default;}
  .cal-cell.cal-present{background:var(--present-bg);color:var(--present);border-color:var(--present);}
  .cal-cell.cal-absent{background:var(--absent-bg);color:var(--absent);border-color:var(--absent);}
  .cal-cell.cal-mixed{background:#3a331c;color:#f2c14e;border-color:#f2c14e;}
  .cal-cell.cal-holiday{background:var(--holiday-bg);color:var(--holiday);border-color:var(--holiday);}
  .cal-cell.cal-weekend{background:var(--surface-2);color:var(--text-faint);border-style:dashed;}
  .cal-cell.cal-today{box-shadow:0 0 0 2px var(--accent) inset;}
  .cal-legend{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    font-size:11px;
    color:var(--text-soft);
    margin-bottom:16px;
  }
  .cal-legend span{display:flex;align-items:center;gap:5px;}
  .cal-legend i{
    width:10px;height:10px;
    border-radius:3px;
    display:inline-block;
  }

  /* ---- leaves / holidays view ---- */
  .leave-tabs{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .leave-tab{
    flex:1;
    text-align:center;
    padding:9px 0;
    border-radius:10px;
    background:var(--surface);
    border:1px solid var(--border);
    font-size:13px;
    font-weight:600;
    color:var(--text-soft);
  }
  .leave-tab.active{
    background:var(--accent);
    color:var(--accent-ink);
    border-color:var(--accent);
  }
  .leave-month-group{
    font-family:var(--font-code);
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:16px 0 8px;
  }
  .leave-month-group:first-child{margin-top:0;}
  .leave-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:8px;
  }
  .leave-item .li-date{font-weight:700;font-size:14px;color:var(--text);}
  .leave-item .li-dow{font-size:11px;color:var(--text-soft);font-family:var(--font-code);}
  .leave-item .li-tag{
    font-size:11px;
    font-weight:700;
    padding:4px 9px;
    border-radius:7px;
  }
  .leave-item.leave .li-tag{background:var(--absent-bg);color:var(--absent);}
  .leave-item.holiday .li-tag{background:var(--holiday-bg);color:var(--holiday);}
</style>
</head>
<body>

<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="eyebrow">MBCET · CSE · S7 CS1</div>
    <h1 id="login-title">Sign in</h1>
    <label for="login-email">Email</label>
    <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    <label for="login-password">Password</label>
    <input type="password" id="login-password" placeholder="At least 6 characters" autocomplete="current-password">
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-submit" onclick="handleAuthSubmit()">Sign in</button>
    <button class="login-switch" id="login-toggle-mode" onclick="toggleAuthMode()">Need an account? Sign up</button>
  </div>
</div>

<div id="app" style="display:none;">

<div class="topbar">
  <div class="topbar-row">
    <div>
      <div class="eyebrow">MBCET · CSE · S7 CS1</div>
      <h1>Attendance tracker</h1>
      <div class="user-email" id="user-email-label"></div>
    </div>
    <button class="signout-btn" onclick="handleSignOut()">Sign out</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-today" onclick="switchTab('today')">Today</div>
  <div class="tab" id="tab-stats" onclick="switchTab('stats')">Stats</div>
  <div class="tab" id="tab-calendar" onclick="switchTab('calendar')">Monthly</div>
  <div class="tab" id="tab-leaves" onclick="switchTab('leaves')">Leaves</div>
</div>

<div class="content" id="view-today">
  <div class="datebar">
    <button onclick="changeDate(-1)">&#8249;</button>
    <div class="date-label">
      <div class="dow" id="dow-label">-</div>
      <div class="full" id="date-label">-</div>
    </div>
    <button onclick="changeDate(1)">&#8250;</button>
    <button class="today-btn" onclick="goToday()" style="width:auto;height:auto;">Today</button>
  </div>
  <button id="holiday-toggle" class="holiday-toggle-btn" onclick="toggleDayHoliday()">Mark whole day as holiday</button>
  <div id="periods-list"><div class="loading">Loading your day…</div></div>
</div>

<div class="content" id="view-stats" style="display:none;">
  <div class="stats-header">
    <select class="month-select" id="stats-month-select" onchange="renderStats()"></select>
    <label class="toggle-lbl">
      <input type="checkbox" id="combine-labs-toggle" onchange="renderStats()">
      Combine Theory & Lab stats
    </label>
  </div>
  <div id="overall-wrap"></div>
  <div id="stats-list"><div class="loading">Crunching the numbers…</div></div>
</div>

<div class="content" id="view-calendar" style="display:none;">
  <div class="cal-nav">
    <button onclick="changeCalMonth(-1)">&#8249;</button>
    <div class="cal-title" id="cal-title-label">-</div>
    <button onclick="changeCalMonth(1)">&#8250;</button>
  </div>
  <div class="cal-summary" id="cal-summary-wrap"></div>
  <div class="cal-legend">
    <span><i style="background:var(--present-bg);border:1px solid var(--present);"></i>Full present</span>
    <span><i style="background:#3a331c;border:1px solid #f2c14e;"></i>Partial</span>
    <span><i style="background:var(--absent-bg);border:1px solid var(--absent);"></i>Full absent</span>
    <span><i style="background:var(--holiday-bg);border:1px solid var(--holiday);"></i>Holiday</span>
    <span><i style="background:var(--surface-2);border:1px dashed var(--border-strong);"></i>Weekend / no class</span>
  </div>
  <div class="cal-grid" id="cal-dow-row"></div>
  <div class="cal-grid" id="cal-grid"><div class="loading">Loading month…</div></div>
</div>

<div class="content" id="view-leaves" style="display:none;">
  <div class="leave-tabs">
    <div class="leave-tab active" id="leave-tab-leave" onclick="switchLeaveTab('leave')">Leave days</div>
    <div class="leave-tab" id="leave-tab-holiday" onclick="switchLeaveTab('holiday')">Holidays</div>
  </div>
  <div id="leaves-list"><div class="loading">Scanning your records…</div></div>
</div>

</div>

<script>

  "CD_LAB":   "Compiler Design (Lab)",
  "WT":       "Web Technology",
  "WT_LAB":   "Web Technology (Lab)",
  "PE3":      "Deep Learning",
  "IE2":      "Environmental Health and Safety",
  "CVV":      "Comprehensive Viva Voce",
  "PROJ":     "Project",
  "SDP":      "SDP"
};

const TEMPLATE = {
  1: [ 
    {id:"p1", time:"09:15–10:15", code:"CD"},
    {id:"p2", time:"10:35–11:35", code:"CD_LAB"},
    {id:"p3", time:"11:35–12:35", code:"CD_LAB"},
    {id:"p4", time:"13:30–14:25", code:"PROJ"},
    {id:"p5", time:"14:25–15:20", code:"PE3"},
    {id:"p6", time:"15:35–16:30", code:"IE2"},
  ],
  2: [ 
    {id:"p1", time:"09:15–10:15", code:"PE3"},
    {id:"p2", time:"10:35–11:35", code:"WT"},
    {id:"p3", time:"11:35–12:35", code:"CD"},
    {id:"p4", time:"13:30–14:25", code:"WT_LAB"},
    {id:"p5", time:"14:25–15:20", code:"WT_LAB"},
    {id:"p6", time:"15:35–16:30", code:"WT_LAB"},
  ],
  3: [ 
    {id:"p1", time:"09:15–10:15", code:"IE2"},
    {id:"p2", time:"10:35–11:35", code:"WT"},
    {id:"p3", time:"11:35–12:35", code:"PE3", label:"Deep Learning (Tutorial)"},
    {id:"p4", time:"13:30–14:25", code:"SDP"},
    {id:"p5", time:"14:25–15:20", code:"CVV"},
    {id:"p6", time:"15:35–16:30", code:"CVV"},
  ],
  4: [ 
    {id:"p1", time:"09:15–10:15", code:"IE2"},
    {id:"p2", time:"10:35–11:35", code:"CD"},
    {id:"p3", time:"11:35–12:35", code:"WT"},
    {id:"p4", time:"13:30–14:25", code:"CD", label:"Compiler Design (Tutorial)"},
    {id:"p5", time:"14:25–15:20", code:"PROJ"},
    {id:"p6", time:"15:35–16:30", code:"PROJ"},
  ],
  5: [ 
    {id:"p1", time:"09:15–10:15", code:"PROJ"},
    {id:"p2", time:"10:35–11:35", code:"PROJ"},
    {id:"p3", time:"11:35–12:35", code:"PROJ"},
    {id:"p4", time:"14:00–14:50", code:"PROJ"},
    {id:"p5", time:"14:50–15:40", code:"PROJ"},
    {id:"p6", time:"15:40–16:30", code:"PROJ"},
  ],
  6: [], 
  0: []  
};

const TERM_START = new Date(2026,6,1);   
const TERM_END   = new Date(2026,10,5);  

let currentDate = new Date();
currentDate.setHours(0,0,0,0);
let activeTab = 'today';
let openSwapId = null;
let addPeriodOpen = false;
let calYear = null, calMonth = null;
let leaveTab = 'leave';

function fmtKey(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtFull(d){
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function dowName(d){
  return d.toLocaleDateString('en-US',{weekday:'long'});
}

const firebaseConfig = {
  apiKey: "AIzaSyD75DbH3nBxRYefWCgPPwac2Zp_5IArEGs",
  authDomain: "mbcet-s6-attendance-tracker.firebaseapp.com",
  projectId: "mbcet-s6-attendance-tracker",
  storageBucket: "mbcet-s6-attendance-tracker.firebasestorage.app",
  messagingSenderId: "130344758664",
  appId: "1:130344758664:web:f1b22abcbb1f9f9358de3d",
  measurementId: "G-NSHNEW0EJN"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let authMode = 'signin'; 

function toggleAuthMode(){
  authMode = (authMode === 'signin') ? 'signup' : 'signin';
  document.getElementById('login-title').textContent = authMode === 'signin' ? 'Sign in' : 'Create account';
  document.getElementById('login-submit').textContent = authMode === 'signin' ? 'Sign in' : 'Create account';
  document.getElementById('login-toggle-mode').textContent = authMode === 'signin' ? 'Need an account? Sign up' : 'Already have an account? Sign in';
  document.getElementById('login-error').textContent = '';
}

async function handleAuthSubmit(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errBox = document.getElementById('login-error');
  errBox.textContent = '';
  if(!email || !password){
    errBox.textContent = 'Enter both email and password.';
    return;
  }
  try{
    if(authMode === 'signin'){
      await auth.signInWithEmailAndPassword(email, password);
    }else{
      await auth.createUserWithEmailAndPassword(email, password);
    }
  }catch(e){
    errBox.textContent = e.message.replace('Firebase: ', '');
  }
}

function handleSignOut(){
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  const loginScreen = document.getElementById('login-screen');
  const app = document.getElementById('app');
  if(user){
    loginScreen.style.display = 'none';
    app.style.display = 'block';
    document.getElementById('user-email-label').textContent = user.email;
    renderToday();
  }else{
    loginScreen.style.display = 'flex';
    app.style.display = 'none';
  }
});

const storage = {
  async get(key){
    const uid = auth.currentUser.uid;
    const snap = await db.collection('users').doc(uid).collection('data').doc(key).get();
    if(!snap.exists) return null;
    return {key, value: snap.data().value};
  },
  async set(key, value){
    const uid = auth.currentUser.uid;
    await db.collection('users').doc(uid).collection('data').doc(key).set({value});
    return {key, value};
  },
  async list(prefix){
    const uid = auth.currentUser.uid;
    const snap = await db.collection('users').doc(uid).collection('data').get();
    const keys = [];
    snap.forEach(d => { if(d.id.indexOf(prefix) === 0) keys.push(d.id); });
    return {keys};
  }
};

async function getDayRecord(dateObj){
  const key = 'day:'+fmtKey(dateObj);
  try{
    const res = await storage.get(key);
    if(res && res.value) return JSON.parse(res.value);
  }catch(e){}
  const dow = dateObj.getDay();
  const tmpl = TEMPLATE[dow] || [];
  return tmpl.map(p => {
    const name = p.label || SUBJECTS[p.code];
    return {
      id:p.id, time:p.time, code:p.code, name:name,
      origCode:p.code, origName:name, status:'unmarked'
    };
  });
}

async function saveDayRecord(dateObj, periods){
  const key = 'day:'+fmtKey(dateObj);
  try{
    await storage.set(key, JSON.stringify(periods));
  }catch(e){ console.error('save failed', e); }
}

function inTerm(d){
  return d >= TERM_START && d <= TERM_END;
}

async function getWeekendSpecial(dateObj){
  const key = 'special:'+fmtKey(dateObj);
  try{
    const res = await storage.get(key);
    return !!(res && res.value === '1');
  }catch(e){ return false; }
}
async function setWeekendSpecial(dateObj, val){
  const key = 'special:'+fmtKey(dateObj);
  try{ await storage.set(key, val ? '1' : '0'); }catch(e){ console.error('special save failed', e); }
}
async function toggleWeekendSpecial(){
  const cur = await getWeekendSpecial(currentDate);
  await setWeekendSpecial(currentDate, !cur);
  addPeriodOpen = false;
  renderToday();
}

function addPeriodPanelHTML(){
  const opts = Object.keys(SUBJECTS).map(code=>`<option value="${code}">${SUBJECTS[code]}</option>`).join('');
  return `
    <div class="add-period-panel" id="add-period-panel">
      <label>Time</label>
      <input type="text" id="new-period-time" placeholder="e.g. 09:15–10:15">
      <label>Subject</label>
      <select id="new-period-code">${opts}</select>
      <button onclick="submitAddPeriod()">Add class</button>
    </div>
  `;
}
function toggleAddPeriodPanel(){
  addPeriodOpen = !addPeriodOpen;
  renderToday();
}
async function submitAddPeriod(){
  const timeInput = document.getElementById('new-period-time');
  const codeInput = document.getElementById('new-period-code');
  const time = (timeInput && timeInput.value.trim()) || 'Special class';
  const code = codeInput ? codeInput.value : Object.keys(SUBJECTS)[0];
  const periods = await getDayRecord(currentDate);
  const id = 'wp' + Date.now();
  periods.push({
    id, time, code, name: SUBJECTS[code],
    origCode: code, origName: SUBJECTS[code],
    status: 'unmarked', custom: true
  });
  await saveDayRecord(currentDate, periods);
  addPeriodOpen = false;
  renderToday();
}
async function removePeriod(id){
  const periods = await getDayRecord(currentDate);
  const filtered = periods.filter(p => p.id !== id);
  await saveDayRecord(currentDate, filtered);
  renderToday();
}

function pctClassFor(pct){
  return pct>=85 ? 'pct-good' : pct>=75 ? 'pct-warn' : 'pct-bad';
}
function pctBarColor(pct){
  return pct>=85 ? 'var(--present)' : pct>=75 ? '#f2c14e' : 'var(--absent)';
}

async function renderToday(){
  document.getElementById('dow-label').textContent = dowName(currentDate);
  document.getElementById('date-label').textContent = fmtFull(currentDate);
  const list = document.getElementById('periods-list');
  const holidayBtn = document.getElementById('holiday-toggle');

  if(!inTerm(currentDate)){
    holidayBtn.style.display = 'none';
    addPeriodOpen = false;
    list.innerHTML = '<div class="empty-note">Outside the semester window (1 Jul – 5 Nov 2026). No classes to mark.</div>';
    return;
  }

  const dow = currentDate.getDay();
  const isWeekend = (dow === 0 || dow === 6);
  const weekendSpecial = isWeekend ? await getWeekendSpecial(currentDate) : false;

  if(isWeekend && !weekendSpecial){
    holidayBtn.style.display = 'none';
    addPeriodOpen = false;
    list.innerHTML = `
      <div class="empty-note">No classes over the weekend.</div>
      <button class="special-toggle-btn" onclick="toggleWeekendSpecial()">Enable special class day</button>
    `;
    return;
  }

  const periods = await getDayRecord(currentDate);
  const weekendBannerHTML = (isWeekend && weekendSpecial)
    ? `<button class="special-toggle-btn active off" onclick="toggleWeekendSpecial()">Special class day enabled — tap to disable</button>`
    : '';

  if(periods.length === 0){
    holidayBtn.style.display = 'none';
    list.innerHTML = weekendBannerHTML + '<div class="empty-note">No periods added yet.</div>';
    if(isWeekend){
      const wrap = document.createElement('div');
      wrap.innerHTML = addPeriodOpen ? addPeriodPanelHTML() :
        '<button class="add-period-launch" id="add-period-launch-btn">+ Add a class</button>';
      list.appendChild(wrap.firstElementChild);
      const launchBtn = document.getElementById('add-period-launch-btn');
      if(launchBtn) launchBtn.addEventListener('click', toggleAddPeriodPanel);
    }
    return;
  }
  holidayBtn.style.display = 'block';

  list.innerHTML = weekendBannerHTML;
  const allHoliday = periods.every(p => p.status === 'holiday');
  holidayBtn.classList.toggle('active', allHoliday);
  holidayBtn.textContent = allHoliday ? 'Holiday marked — tap to undo' : 'Mark whole day as holiday';

  periods.forEach(p => {
    const card = document.createElement('div');
    card.className = 'period-card ' + (p.status==='present'?'present':p.status==='absent'?'absent':p.status==='nc'?'nc':p.status==='holiday'?'holiday':'');

    const swapOptions = Object.keys(SUBJECTS).map(code =>
      `<option value="${code}" ${p.code===code?'selected':''}>${SUBJECTS[code]}</option>`
    ).join('');

    card.innerHTML = `
      <div class="p-top">
        <div>
          <div class="p-time">${p.time}</div>
          <div class="p-name">${p.name}</div>
          <div class="p-code">${p.code}${p.code!==p.origCode?' · substituted':''}</div>
        </div>
        <div style="display:flex;">
          <button class="swap-btn" data-id="${p.id}">Swap</button>
          ${p.custom ? `<button class="card-remove-btn" data-id="${p.id}">Remove</button>` : ''}
        </div>
      </div>
      <div class="status-row">
        <button data-id="${p.id}" data-status="present" class="${p.status==='present'?'sel-present':''}">Present</button>
        <button data-id="${p.id}" data-status="absent" class="${p.status==='absent'?'sel-absent':''}">Absent</button>
        <button data-id="${p.id}" data-status="nc" class="${p.status==='nc'?'sel-nc':''}">No class</button>
        <button data-id="${p.id}" data-status="holiday" class="${p.status==='holiday'?'sel-holiday':''}">Holiday</button>
      </div>
      <div class="swap-panel" id="swap-${p.id}">
        <select id="sel-${p.id}">${swapOptions}</select>
        <div class="swap-actions">
          <button class="reset" data-id="${p.id}">Reset to timetable</button>
          <button class="apply" data-id="${p.id}">Apply swap</button>
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  if(isWeekend){
    const wrap = document.createElement('div');
    wrap.innerHTML = addPeriodOpen ? addPeriodPanelHTML() :
      '<button class="add-period-launch" id="add-period-launch-btn">+ Add a class</button>';
    list.appendChild(wrap.firstElementChild);
    const launchBtn = document.getElementById('add-period-launch-btn');
    if(launchBtn) launchBtn.addEventListener('click', toggleAddPeriodPanel);
  }

  list.querySelectorAll('.card-remove-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      await removePeriod(btn.dataset.id);
    });
  });

  list.querySelectorAll('.status-row button').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const status = btn.dataset.status;
      const periods = await getDayRecord(currentDate);
      const p = periods.find(x=>x.id===id);
      p.status = (p.status === status) ? 'unmarked' : status;
      await saveDayRecord(currentDate, periods);
      renderToday();
    });
  });

  list.querySelectorAll('.swap-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const panel = document.getElementById('swap-'+id);
      openSwapId = (openSwapId === id) ? null : id;
      list.querySelectorAll('.swap-panel').forEach(pn => pn.classList.remove('open'));
      if(openSwapId) document.getElementById('swap-'+openSwapId).classList.add('open');
    });
  });

  list.querySelectorAll('.swap-actions .apply').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const newCode = document.getElementById('sel-'+id).value;
      const periods = await getDayRecord(currentDate);
      const p = periods.find(x=>x.id===id);
      p.code = newCode;
      p.name = SUBJECTS[newCode];
      await saveDayRecord(currentDate, periods);
      openSwapId = null;
      renderToday();
    });
  });
  list.querySelectorAll('.swap-actions .reset').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const periods = await getDayRecord(currentDate);
      const p = periods.find(x=>x.id===id);
      p.code = p.origCode;
      p.name = p.origName;
      await saveDayRecord(currentDate, periods);
      openSwapId = null;
      renderToday();
    });
  });
}

function monthOptionsHTML(){
  let html = '';
  const d = new Date(TERM_START.getFullYear(), TERM_START.getMonth(), 1);
  const end = new Date(TERM_END.getFullYear(), TERM_END.getMonth(), 1);
  while(d <= end){
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0');
    const label = d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    html += `<option value="${y}-${m}">${label}</option>`;
    d.setMonth(d.getMonth()+1);
  }
  return html;
}
function populateMonthSelect(){
  const sel = document.getElementById('stats-month-select');
  if(sel.options.length > 0) return;
  sel.innerHTML = '<option value="all">All time</option>' + monthOptionsHTML();
}

async function renderStats(){
  populateMonthSelect();
  const overallWrap = document.getElementById('overall-wrap');
  const list = document.getElementById('stats-list');
  list.innerHTML = '<div class="loading">Crunching the numbers…</div>';

  const combineLabs = document.getElementById('combine-labs-toggle').checked;
  const selectedMonth = document.getElementById('stats-month-select').value;

  let keys = [];
  try{
    const res = await storage.list('day:');
    keys = (res && res.keys) ? res.keys : [];
  }catch(e){ keys = []; }

  if(selectedMonth && selectedMonth !== 'all'){
    keys = keys.filter(k => k.slice(4,11) === selectedMonth);
  }

  const totals = {}; 
  let totalHeld = 0, totalPresent = 0;

  for(const key of keys){
    try{
      const res = await storage.get(key);
      if(!res || !res.value) continue;
      const periods = JSON.parse(res.value);
      periods.forEach(p => {
        if(p.status === 'unmarked' || p.status === 'nc' || p.status === 'holiday') return;
        
        let effectiveCode = p.code;
        if (p.name && p.name.includes('(Lab)')) {
           if (p.code === 'CD') effectiveCode = 'CD_LAB';
           if (p.code === 'WT') effectiveCode = 'WT_LAB';
        }

        if (combineLabs) {
           if (effectiveCode === 'CD_LAB') effectiveCode = 'CD';
           if (effectiveCode === 'WT_LAB') effectiveCode = 'WT';
        }

        let dispName = SUBJECTS[effectiveCode] || p.name || effectiveCode;
        if (combineLabs) {
           if (effectiveCode === 'CD') dispName = "Compiler Design (Theory + Lab)";
           if (effectiveCode === 'WT') dispName = "Web Technology (Theory + Lab)";
        }

        if(!totals[effectiveCode]) totals[effectiveCode] = {held:0, present:0, name:dispName};
        totals[effectiveCode].held += 1;
        totalHeld += 1;
        if(p.status === 'present'){ totals[effectiveCode].present += 1; totalPresent += 1; }
      });
    }catch(e){}
  }

  const overallPct = totalHeld ? Math.round((totalPresent/totalHeld)*100) : 0;
  overallWrap.innerHTML = `
    <div class="overall-card">
      <div>
        <div class="lbl">Overall attendance</div>
        <div class="val ${pctClassFor(overallPct)}">${overallPct}%</div>
      </div>
      <div style="text-align:right;font-size:12px;color:var(--text-soft);">
        ${totalPresent} / ${totalHeld}<br>periods attended
      </div>
    </div>
  `;

  const codes = Object.keys(totals).sort((a,b)=> totals[b].held - totals[a].held);
  if(codes.length === 0){
    list.innerHTML = '<div class="empty-note">No attendance marked yet. Head to the Today tab to get started.</div>';
    return;
  }

  list.innerHTML = '';
  codes.forEach(code => {
    const t = totals[code];
    const pct = t.held ? Math.round((t.present/t.held)*100) : 0;
    const pctClass = pctClassFor(pct);
    const barColor = pctBarColor(pct);
    const div = document.createElement('div');
    div.className = 'stat-card';
    div.innerHTML = `
      <div class="stat-top">
        <div>
          <div class="stat-name">${t.name}</div>
          <div class="stat-code">${code}</div>
        </div>
        <div class="stat-pct ${pctClass}">${pct}%</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${barColor};"></div></div>
      <div class="stat-sub"><span>Present: ${t.present}</span><span>Held: ${t.held}</span></div>
    `;
    list.appendChild(div);
  });
}

function switchTab(tab){
  activeTab = tab;
  document.getElementById('tab-today').classList.toggle('active', tab==='today');
  document.getElementById('tab-stats').classList.toggle('active', tab==='stats');
  document.getElementById('tab-calendar').classList.toggle('active', tab==='calendar');
  document.getElementById('tab-leaves').classList.toggle('active', tab==='leaves');
  document.getElementById('view-today').style.display = tab==='today' ? 'block':'none';
  document.getElementById('view-stats').style.display = tab==='stats' ? 'block':'none';
  document.getElementById('view-calendar').style.display = tab==='calendar' ? 'block':'none';
  document.getElementById('view-leaves').style.display = tab==='leaves' ? 'block':'none';
  if(tab==='today') renderToday();
  else if(tab==='stats') renderStats();
  else if(tab==='calendar') renderCalendar();
  else if(tab==='leaves') renderLeaves();
}

function ensureCalInit(){
  if(calYear === null){
    calYear = currentDate.getFullYear();
    calMonth = currentDate.getMonth();
  }
}

function changeCalMonth(delta){
  ensureCalInit();
  calMonth += delta;
  if(calMonth < 0){ calMonth = 11; calYear--; }
  if(calMonth > 11){ calMonth = 0; calYear++; }
  renderCalendar();
}

function jumpToDate(dateKey){
  const [y,m,d] = dateKey.split('-').map(Number);
  currentDate = new Date(y, m-1, d);
  switchTab('today');
}

async function renderCalendar(){
  ensureCalInit();
  const grid = document.getElementById('cal-grid');
  const dowRow = document.getElementById('cal-dow-row');
  const titleLabel = document.getElementById('cal-title-label');
  const summaryWrap = document.getElementById('cal-summary-wrap');

  const monthDate = new Date(calYear, calMonth, 1);
  titleLabel.textContent = monthDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  dowRow.innerHTML = ['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  grid.innerHTML = '<div class="loading">Loading month…</div>';

  const firstDow = monthDate.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today0 = new Date(); today0.setHours(0,0,0,0);

  let cellsHTML = '';
  for(let i=0;i<firstDow;i++) cellsHTML += '<div class="cal-cell cal-blank"></div>';

  let presentDays=0, absentDays=0, mixedDays=0, holidayDays=0;

  for(let day=1; day<=daysInMonth; day++){
    const d = new Date(calYear, calMonth, day);
    let cls = 'cal-empty';
    if(inTerm(d)){
      const dow = d.getDay();
      const periods = await getDayRecord(d);
      const allHoliday = periods.length > 0 && periods.every(p => p.status === 'holiday');
      const counted = periods.filter(p => p.status === 'present' || p.status === 'absent');
      if(allHoliday){
        cls = 'cal-holiday'; holidayDays++;
      }else if(counted.length === 0){
        cls = (dow===0 || dow===6) ? 'cal-weekend' : 'cal-empty';
      }else{
        const absentCount = counted.filter(p => p.status === 'absent').length;
        const presentCount = counted.filter(p => p.status === 'present').length;
        if(absentCount > 0 && presentCount > 0){ cls = 'cal-mixed'; mixedDays++; }
        else if(absentCount > 0){ cls = 'cal-absent'; absentDays++; }
        else { cls = 'cal-present'; presentDays++; }
      }
    }
    const isToday = d.getTime() === today0.getTime();
    cellsHTML += `<div class="cal-cell ${cls}${isToday?' cal-today':''}" onclick="jumpToDate('${fmtKey(d)}')">${day}</div>`;
  }

  grid.innerHTML = cellsHTML;

  summaryWrap.innerHTML = `
    <div>
      <div class="lbl">Full-present days</div>
      <div class="val pct-good">${presentDays}</div>
    </div>
    <div style="text-align:right;font-size:12px;color:var(--text-soft);">
      ${absentDays} full-absent · ${mixedDays} partial · ${holidayDays} holiday
    </div>
  `;
}

function switchLeaveTab(tab){
  leaveTab = tab;
  document.getElementById('leave-tab-leave').classList.toggle('active', tab==='leave');
  document.getElementById('leave-tab-holiday').classList.toggle('active', tab==='holiday');
  renderLeaves();
}

async function renderLeaves(){
  const list = document.getElementById('leaves-list');
  list.innerHTML = '<div class="loading">Scanning your records…</div>';

  let keys = [];
  try{
    const res = await storage.list('day:');
    keys = (res && res.keys) ? res.keys : [];
  }catch(e){ keys = []; }

  const leaveDays = [];
  const holidayDays = [];

  for(const key of keys){
    try{
      const res = await storage.get(key);
      if(!res || !res.value) continue;
      const periods = JSON.parse(res.value);
      if(periods.length === 0) continue;

      const dateStr = key.slice(4);
      const [y,m,d] = dateStr.split('-').map(Number);
      const dateObj = new Date(y, m-1, d);

      const allHoliday = periods.every(p => p.status === 'holiday');
      if(allHoliday){
        holidayDays.push(dateObj);
        continue;
      }
      const counted = periods.filter(p => p.status === 'present' || p.status === 'absent');
      if(counted.length > 0 && counted.every(p => p.status === 'absent')){
        leaveDays.push(dateObj);
      }
    }catch(e){}
  }

  leaveDays.sort((a,b)=>a-b);
  holidayDays.sort((a,b)=>a-b);

  const activeList = leaveTab === 'leave' ? leaveDays : holidayDays;
  const tagLabel = leaveTab === 'leave' ? 'Leave' : 'Holiday';
  const itemClass = leaveTab === 'leave' ? 'leave' : 'holiday';

  if(activeList.length === 0){
    list.innerHTML = `<div class="empty-note">No full ${leaveTab==='leave'?'leave':'holiday'} days recorded yet.</div>`;
    return;
  }

  let html = '';
  let lastMonthKey = '';
  activeList.forEach(d => {
    const monthKey = d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    if(monthKey !== lastMonthKey){
      html += `<div class="leave-month-group">${monthKey}</div>`;
      lastMonthKey = monthKey;
    }
    html += `
      <div class="leave-item ${itemClass}">
        <div>
          <div class="li-date">${fmtFull(d)}</div>
          <div class="li-dow">${dowName(d)}</div>
        </div>
        <div class="li-tag">${tagLabel}</div>
      </div>
    `;
  });
  list.innerHTML = html;
}

async function toggleDayHoliday(){
  const periods = await getDayRecord(currentDate);
  if(periods.length === 0) return;
  const allHoliday = periods.every(p => p.status === 'holiday');
  periods.forEach(p => { p.status = allHoliday ? 'unmarked' : 'holiday'; });
  await saveDayRecord(currentDate, periods);
  renderToday();
}

function changeDate(delta){
  currentDate.setDate(currentDate.getDate()+delta);
  renderToday();
}
function goToday(){
  currentDate = new Date();
  currentDate.setHours(0,0,0,0);
  renderToday();
}
</script>
